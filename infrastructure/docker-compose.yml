version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: r360-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: r360flow
      POSTGRES_USER: r360
      POSTGRES_PASSWORD: r360_dev_password
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256"
    ports:
      - "5432:5432"
    volumes:
      - r360_pgdata:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U r360 -d r360flow"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  redis:
    image: redis:7-alpine
    container_name: r360-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - r360_redis:/data
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --appendonly yes
      --save 60 1000
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    deploy:
      resources:
        limits:
          memory: 256M

volumes:
  r360_pgdata:
    driver: local
  r360_redis:
    driver: local
